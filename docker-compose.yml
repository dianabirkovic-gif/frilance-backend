services:
  postgres:
    image: postgres:16-alpine
    container_name: frilanceos-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: frilanceos
      POSTGRES_USER: frilanceos
      POSTGRES_PASSWORD: frilanceos
    ports:
      - "5432:5432"
    volumes:
      - frilanceos-postgres-data:/var/lib/postgresql/data

volumes:
  frilanceos-postgres-data: