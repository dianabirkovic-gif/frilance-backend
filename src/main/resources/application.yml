spring:
  application:
    name: frilance-os-backend
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/frilanceos}
    username: ${DB_USERNAME:frilanceos}
    password: ${DB_PASSWORD:frilanceos}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: ${PORT:8080}

app:
  jwt:
    secret: ${JWT_SECRET:change-me-to-a-real-base64-secret-before-any-real-use}
    access-token-ttl-minutes: ${JWT_ACCESS_TOKEN_TTL_MINUTES:1440}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}

springdoc:
  swagger-ui:
    path: /docs

management:
  endpoints:
    web:
      exposure:
        include: health

logging:
  level:
    com.frilanceos: INFO